[pytest]
asyncio_mode = auto
testpaths = tests
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

markers =
    unit: 单元测试（无外部依赖）
    integration: 集成测试（需要 Docker 依赖）
    eval: Eval 评估测试（Golden Dataset）
    e2e: 端到端测试（需要完整环境）
    slow: 运行较慢的测试

# 按标记分层运行：
#   快速验证：pytest -m "unit"
#   CI pipeline：pytest -m "unit or integration"
#   完整套件：pytest -m "unit or integration or eval"
