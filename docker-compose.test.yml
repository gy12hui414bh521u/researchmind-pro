version: "3.9"

# ══════════════════════════════════════════════════════════════════════
# ResearchMind Pro — CI 集成测试基础设施
# 服务名、镜像版本与 docker-compose.yml 保持完全一致
# 用法：docker compose -f docker-compose.test.yml up -d
#       docker compose -f docker-compose.test.yml down -v
# ══════════════════════════════════════════════════════════════════════

services:

  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: researchmind_test_qdrant
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    # CI 里直接暴露到 localhost，pytest 用 http://localhost:6333
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - test_net

  postgres:
    image: postgres:16-alpine
    container_name: researchmind_test_postgres
    environment:
      POSTGRES_USER:     testuser
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB:       researchmind_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d researchmind_test"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - test_net

  redis:
    image: redis:7.4-alpine
    container_name: researchmind_test_redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - test_net

networks:
  test_net:
    driver: bridge
