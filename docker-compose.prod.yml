version: "3.9"

# ══════════════════════════════════════════════════════════════════════
# ResearchMind Pro — 生产环境覆盖配置
# 使用：docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ══════════════════════════════════════════════════════════════════════

services:

  qdrant:
    environment:
      QDRANT__SERVICE__API_KEY: "${QDRANT_API_KEY}"
    # 生产环境不对外暴露端口，仅内网访问
    ports: []
    expose:
      - "6333"
      - "6334"
    deploy:
      resources:
        limits:
          memory: 2G

  postgres:
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    ports: []
    expose:
      - "5432"
    deploy:
      resources:
        limits:
          memory: 1G
    # 生产环境更严格的 PostgreSQL 配置
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=4MB

  redis:
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save 300 1
      --appendonly yes
    ports: []
    expose:
      - "6379"
    deploy:
      resources:
        limits:
          memory: 1G
